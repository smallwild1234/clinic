<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 逐字稿與摘要雙重版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .debug-box { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 150px; overflow-y: auto; margin: 15px 0; border: 1px solid #333; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fff; min-height: 400px; white-space: pre-wrap; line-height: 1.6; font-size: 1.05em; color: #333; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; transition: 0.2s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-save { background: #6c5ce7; color: white; display: none; }
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        .section-header { color: #2c3e50; border-left: 5px solid #3498db; padding-left: 10px; margin-top: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (逐字稿 + 繁體摘要雙重版)</h2>
    <div id="statusTag" class="status-tag fail">等待輸入 API Key</div>
    
    <div>
        <button onclick="inputKey()" class="btn-blue">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-green" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" class="btn-red" disabled>⏹️ 3. 停止並分析</button>
    </div>

    <div id="debugOutput" class="debug-box">系統準備就緒...</div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <h3>💡 AI 分析結果 (含逐字稿)：</h3>
        <button id="downloadTxtBtn" class="btn-save" onclick="downloadSummary()">💾 下載完整紀錄 (.txt)</button>
    </div>
    
    <div id="answer">停止錄音後，AI 會先還原診間對話，再產出結構化摘要。</div>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let current_model_index = 0;
    let mediaRecorder, audioChunks = [];
    let lastAudioBase64 = "";

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        const time = new Date().toLocaleTimeString();
        let prefix = type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ");
        box.innerHTML += `[${time}] ${prefix}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    model_queue = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent') && !m.name.includes('tts'))
                        .map(m => m.name)
                        .sort((a, b) => {
                            if (a.includes('3.1')) return -1;
                            if (a.includes('1.5')) return -1;
                            return 1;
                        });
                    log(`已載入 ${model_queue.length} 個可用模型，預備產出逐字稿與摘要。`);
                    updateStatus(`系統就緒 (完整紀錄模式)`, "ready");
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (e) { log("Key 驗證失敗", "err"); }
        }
    }

    function updateStatus(text, className) {
        const s = document.getElementById('statusTag');
        s.innerText = text; s.className = `status-tag ${className}`;
    }

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                
                // 下載錄音檔
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const timestamp = new Date().toLocaleString('zh-TW', {hour12:false}).replace(/[\/\s:]/g, '-');
                a.href = url; a.download = `診間原音_${timestamp}.webm`;
                a.click();
                log(`聲音檔備份完成`);

                // 轉碼並分析
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    lastAudioBase64 = reader.result.split(',')[1];
                    current_model_index = 0;
                    document.getElementById('downloadTxtBtn').style.display = "none";
                    executeChainAnalysis();
                };
            };

            audioChunks = [];
            mediaRecorder.start();
            updateStatus("🔴 診間錄製中 (雙重備份模式)", "warning");
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            log("錄音已啟動，請開始問診。");
        } catch (err) { log("麥克風錯誤: " + err.message, "err"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        mediaRecorder.stop();
        document.getElementById('stopBtn').disabled = true;
    };

    async function executeChainAnalysis() {
        if (current_model_index >= model_queue.length) {
            updateStatus("❌ 分析失敗", "fail");
            document.getElementById('startBtn').disabled = false;
            return;
        }

        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        updateStatus(`⌛ 分析中: ${modelName}`, "warning");

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "你是台灣專業醫療助理。請精準聽取這段診間錄音，並嚴格按照以下格式輸出：\n\n一、 【診間對話逐字稿】\n(請盡可能詳細還原對話原文，並標註語者，例如：『醫師：...』、『病患：...』。使用繁體中文。)\n\n二、 【醫學結構化摘要】\n1. 主訴 (CC)\n2. 現病史 (PH)\n3. 處置與建議\n\n注意事項：\n- 必須使用『台灣繁體中文』。\n- 使用台灣醫學慣用語。\n- 若有多位家屬，請標註『家屬A』、『家屬B』。" },
                            { inlineData: { mimeType: "audio/webm", data: lastAudioBase64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (response.status === 200 && data.candidates) {
                const resultText = data.candidates[0].content.parts[0].text;
                document.getElementById('answer').innerText = resultText;
                updateStatus("✅ 逐字稿與摘要完成", "ready");
                log(`🎉 ${modelName} 分析成功！已包含逐字稿。`);
                document.getElementById('downloadTxtBtn').style.display = "block";
                document.getElementById('startBtn').disabled = false;
            } else {
                log(`${modelName} 忙碌，切換中...`, "warn");
                current_model_index++;
                setTimeout(executeChainAnalysis, 500); 
            }
        } catch (err) {
            current_model_index++;
            executeChainAnalysis();
        }
    }

    function downloadSummary() {
        const text = document.getElementById('answer').innerText;
        const timestamp = new Date().toLocaleString('zh-TW', {hour12:false}).replace(/[\/\s:]/g, '-');
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `診間完整紀錄_${timestamp}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL
