<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診間紀錄 - 終極穩定修復版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; border: 1px solid #ccc; }
        .ready { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .fail { background: #f8d7da; color: #721c24; }
        .debug-box { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 150px; overflow-y: auto; margin: 15px 0; border: 1px solid #333; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fff; min-height: 400px; white-space: pre-wrap; line-height: 1.6; font-size: 1.05em; color: #333; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; transition: 0.2s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-save { background: #6c5ce7; color: white; display: none; }
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
    </style>
    
    <script>
        // 將核心函數移至最頂端，確保網頁載入時即可被呼叫
        let _USER_KEY = "";
        let model_queue = [];
        let current_model_index = 0;
        let mediaRecorder, audioChunks = [];
        let lastAudioBase64 = "";

        async function inputKey() {
            console.log("Key button clicked"); // 偵錯用
            const key = prompt("請貼入您的 API Key:");
            if (!key) return;
            
            _USER_KEY = key.trim();
            const statusTag = document.getElementById('statusTag');
            const startBtn = document.getElementById('startBtn');
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    model_queue = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent') && !m.name.includes('tts'))
                        .map(m => m.name)
                        .sort((a, b) => a.includes('3.1') ? -1 : (a.includes('1.5') ? -1 : 1));
                    
                    log(`已載入 ${model_queue.length} 個可用模型。`);
                    statusTag.innerText = "✅ 系統就緒 (完整紀錄模式)";
                    statusTag.className = "status-tag ready";
                    startBtn.disabled = false;
                } else {
                    alert("Key 無法讀取模型，請確認權限。");
                }
            } catch (e) { 
                console.error(e);
                alert("連線失敗，請檢查網路或 API Key。"); 
            }
        }

        function log(msg, type = "info") {
            const box = document.getElementById('debugOutput');
            if(!box) return;
            const time = new Date().toLocaleTimeString();
            let prefix = type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ");
            box.innerHTML += `[${time}] ${prefix}${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (逐字稿 + 繁體摘要雙重版)</h2>
    <div id="statusTag" class="status-tag fail">等待輸入 API Key</div>
    
    <div>
        <button id="keyBtn" onclick="inputKey()" class="btn-blue">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-green" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" class="btn-red" disabled>⏹️ 3. 停止並分析</button>
    </div>

    <div id="debugOutput" class="debug-box">系統準備就緒...</div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <h3>💡 AI 分析結果 (含逐字稿)：</h3>
        <button id="downloadTxtBtn" class="btn-save" onclick="downloadSummary()">💾 下載完整紀錄 (.txt)</button>
    </div>
    
    <div id="answer">停止錄音後，AI 會先還原診間對話，再產出結構化摘要。</div>
</div>

<script>
    // 錄音與分析邏輯
    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const timestamp = new Date().toLocaleString('zh-TW', {hour12:false}).replace(/[\/\s:]/g, '-');
                a.href = url; a.download = `診間原音_${timestamp}.webm`;
                a.click();
                log(`聲音檔備份完成`);

                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    lastAudioBase64 = reader.result.split(',')[1];
                    current_model_index = 0;
                    document.getElementById('downloadTxtBtn').style.display = "none";
                    executeChainAnalysis();
                };
            };

            audioChunks = [];
            mediaRecorder.start();
            const st = document.getElementById('statusTag');
            st.innerText = "🔴 診間錄製中...";
            st.className = "status-tag warning";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            log("錄音已啟動。");
        } catch (err) { log("麥克風錯誤: " + err.message, "err"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        mediaRecorder.stop();
        document.getElementById('stopBtn').disabled = true;
    };

    async function executeChainAnalysis() {
        if (current_model_index >= model_queue.length) {
            const st = document.getElementById('statusTag');
            st.innerText = "❌ 分析失敗";
            st.className = "status-tag fail";
            document.getElementById('startBtn').disabled = false;
            return;
        }

        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        log(`嘗試模型: ${modelName}`);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "你是台灣專業醫療助理。請精準聽取這段診間錄音，輸出：一、診間對話逐字稿 (標註語者)。二、醫學結構化摘要 (主訴、現病史、建議)。請用台灣繁體中文。" },
                            { inlineData: { mimeType: "audio/webm", data: lastAudioBase64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                const st = document.getElementById('statusTag');
                st.innerText = "✅ 分析完成";
                st.className = "status-tag ready";
                document.getElementById('downloadTxtBtn').style.display = "block";
                document.getElementById('startBtn').disabled = false;
            } else {
                current_model_index++;
                executeChainAnalysis();
            }
        } catch (err) {
            current_model_index++;
            executeChainAnalysis();
        }
    }

    function downloadSummary() {
        const text = document.getElementById('answer').innerText;
        const timestamp = new Date().toLocaleString('zh-TW', {hour12:false}).replace(/[\/\s:]/g, '-');
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `診間完整紀錄_${timestamp}.txt`;
        a.click();
    }
</script>
</body>
</html>
