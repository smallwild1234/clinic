<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 核心穩定版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .status { padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .ready { background: #e3f2fd; color: #0d47a1; }
        .recording { background: #ffebee; color: #b71c1c; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        #answer { border: 2px solid #2e7d32; padding: 20px; border-radius: 10px; background: #fff; min-height: 150px; white-space: pre-wrap; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; }
        .btn-blue { background: #1976d2; color: white; }
        .btn-red { background: #d32f2f; color: white; }
        .btn-green { background: #388e3c; color: white; }
        #transcriptInput { width: 100%; height: 150px; margin-top: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 - 核心穩定採集器</h2>
    <div id="status" class="status ready">請設定 API Key</div>
    
    <button onclick="inputKey()" class="btn-blue">🔑 1. 設定 API Key</button>
    <button id="startBtn" class="btn-green" disabled>🎤 2. 開始錄音 (純錄音+備份辨識)</button>
    <button id="stopBtn" class="btn-red" disabled>⏹️ 3. 停止並存檔</button>

    <div style="margin: 20px 0;">
        <strong>👂 辨識文字 (若辨識中斷，可手動於此補貼):</strong>
        <textarea id="transcriptInput" placeholder="錄音時文字會嘗試在此生成..."></textarea>
    </div>

    <button id="analyzeBtn" class="btn-blue" style="width:100%;" onclick="executeAnalysis()">🚀 4. 送交 AI 整理摘要</button>

    <h3>💡 AI 整理摘要 (NotebookLM 格式):</h3>
    <div id="answer">摘要將顯示在此...</div>
</div>

<script>
    let _USER_KEY = "";
    let recognition, fullTranscript = "";
    let isRecording = false;
    let mediaRecorder, audioChunks = [];

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            document.getElementById('status').innerText = "✅ 系統就緒";
            document.getElementById('startBtn').disabled = false;
        }
    }

    // 啟動語音辨識 (盡量輕量化)
    function startSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcriptInput').value = fullTranscript + interim;
        };
        recognition.onend = () => { if(isRecording) recognition.start(); };
        recognition.start();
    }

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `診間原音_${new Date().getTime()}.webm`;
                a.click();
            };

            isRecording = true;
            fullTranscript = "";
            audioChunks = [];
            document.getElementById('transcriptInput').value = "";
            
            mediaRecorder.start();
            startSpeech();

            document.getElementById('status').innerText = "🔴 錄音中 (聲音軌絕對安全)";
            document.getElementById('status').className = "status recording";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        } catch (err) { alert("麥克風錯誤"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        isRecording = false;
        if(recognition) recognition.stop();
        mediaRecorder.stop();
        document.getElementById('status').innerText = "✅ 錄音已存檔，請確認文字內容";
        document.getElementById('status').className = "status ready";
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('startBtn').disabled = false;
    };

    async function executeAnalysis() {
        const textToAnalyze = document.getElementById('transcriptInput').value;
        if (!textToAnalyze) return alert("請確認有文字內容再分析");
        
        document.getElementById('answer').innerText = "⌛ AI 正在整理紀錄...";
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "整理成醫學摘要，標註語者：\n\n" + textToAnalyze }] }]
                })
            });
            const data = await response.json();
            document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
        } catch (err) { alert("分析失敗，請檢查網路或 API Key"); }
    }
</script>
</body>
</html>
