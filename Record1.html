<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 醫療分段採集穩定版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .status-tag { padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        .ready { background: #e3f2fd; color: #0d47a1; }
        .recording { background: #ffebee; color: #b71c1c; border: 1px solid #ffcdd2; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #answer { border: 2px solid #2e7d32; padding: 20px; border-radius: 12px; background: #fafffa; white-space: pre-wrap; line-height: 1.8; }
        button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; transition: 0.3s; }
        .btn-blue { background: #1976d2; color: white; }
        .btn-red { background: #d32f2f; color: white; }
        .btn-green { background: #388e3c; color: white; }
        #transcriptPreview { width: 100%; height: 200px; margin-top: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; box-sizing: border-box; background: #fff; overflow-y: auto; font-size: 15px; }
        .log-box { background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (分段抗干擾版)</h2>
    <div id="status" class="status-tag ready">等待 API Key 啟動</div>
    
    <div class="log-box" id="debugLog">系統準備就緒...</div>

    <div>
        <button onclick="inputKey()" class="btn-blue">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-green" disabled>🎤 2. 開始問診</button>
        <button id="stopBtn" class="btn-red" disabled>⏹️ 3. 停止並存檔</button>
    </div>

    <div>
        <strong>👂 文字即時預覽 (每分鐘自動存檔)：</strong>
        <div id="transcriptPreview">尚未錄音...</div>
    </div>

    <button id="analyzeBtn" class="btn-blue" style="width:100%; margin-top:15px;" onclick="executeAnalysis()">🚀 4. 送交 AI 整理摘要</button>

    <h3>💡 AI 診斷建議：</h3>
    <div id="answer">摘要將顯示在此...</div>
</div>

<script>
    let _USER_KEY = "";
    let recognition, finalTranscript = "";
    let isRecording = false;
    let mediaRecorder, audioChunks = [];
    let relayTimer;

    function log(msg) {
        const box = document.getElementById('debugLog');
        box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入您的 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            document.getElementById('status').innerText = "✅ 系統就緒";
            document.getElementById('startBtn').disabled = false;
            log("API Key 已儲存");
        }
    }

    function startRecognition() {
        if (!isRecording) return;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (recognition) recognition.stop();

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';

        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + "\n";
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcriptPreview').innerText = finalTranscript + interim;
        };

        recognition.onend = () => {
            if (isRecording) {
                log("辨識週期結束，嘗試自動接力...");
                setTimeout(startRecognition, 500);
            }
        };

        try { recognition.start(); } catch(e) { log("辨識啟動失敗，重試中..."); }
    }

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `診間原音_${new Date().getTime()}.webm`;
                a.click();
                log("✅ 聲音檔 (.webm) 下載完成");
            };

            isRecording = true;
            finalTranscript = "";
            audioChunks = [];
            
            mediaRecorder.start();
            startRecognition();

            // 強制接力：每 60 秒換一次引擎，避免瀏覽器一分半鐘切斷
            relayTimer = setInterval(() => {
                if (isRecording) {
                    log("⏱️ 進行 60 秒健康檢查，強制刷新辨識引擎...");
                    startRecognition();
                }
            }, 60000);

            document.getElementById('status').innerText = "🔴 錄音與辨識運行中";
            document.getElementById('status').className = "status-tag recording";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        } catch (err) { log("麥克風權限錯誤"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        isRecording = false;
        clearInterval(relayTimer);
        if(recognition) recognition.stop();
        mediaRecorder.stop();
        document.getElementById('status').innerText = "✅ 錄製結束，請點擊分析";
        document.getElementById('status').className = "status-tag ready";
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('startBtn').disabled = false;
    };

    async function executeAnalysis() {
        const textToAnalyze = document.getElementById('transcriptPreview').innerText;
        if (!textToAnalyze || textToAnalyze === "尚未錄音...") return alert("目前沒有文字可供分析");
        
        document.getElementById('answer').innerText = "⌛ AI 正在整理醫學摘要，請稍候...";
        log("發送分析請求...");

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請整理成結構化醫學摘要，標註語者(醫師/病患/家屬)：\n\n" + textToAnalyze }] }]
                })
            });
            const data = await response.json();
            if (data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                log("🎉 AI 分析成功！");
            } else {
                alert("AI 回傳異常：" + JSON.stringify(data.error || data));
            }
        } catch (err) { 
            alert("分析失敗，可能是網路超時，請稍後再按一次分析。");
            log("連線錯誤: " + err.message);
        }
    }
</script>
</body>
</html>
