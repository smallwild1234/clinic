<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 錄音與分析雙備份版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .debug-box { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 12px; height: 120px; overflow-y: auto; margin: 15px 0; border: 1px solid #34495e; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fff; min-height: 150px; white-space: pre-wrap; line-height: 1.8; font-size: 1.1em; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-right: 10px; margin-bottom: 10px; }
        .btn-key { background: #3498db; color: white; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-download { background: #6c5ce7; color: white; }
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        .recording-dot { color: red; animation: blink 1s infinite; display: none; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (錄音/文字/AI 三重備份)</h2>
    <div id="statusTag" class="status-tag fail">等待輸入 API Key</div>
    <span id="recDot" class="recording-dot"> ● 錄音中 (聲音+文字)</span>
    
    <div>
        <button onclick="inputKey()" class="btn-key">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-start" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ 3. 停止並存檔</button>
        <button id="downloadBtn" class="btn-download" style="display:none;" onclick="downloadTxt()">💾 下載 AI 摘要</button>
    </div>

    <div id="debugOutput" class="debug-box">系統初始化...</div>
    <div id="transcriptPreview" style="font-style: italic; color: #7f8c8d; margin-bottom: 15px; border-left: 4px solid #bdc3c7; padding-left: 10px;">文字預覽...</div>
    
    <h3>💡 結構化摘要：</h3>
    <div id="answer">分析完成後，系統會自動彈出「聲音檔」下載，摘要可手動點選下載。</div>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let current_model_index = 0;
    let recognition, fullTranscript = "";
    
    // 聲音錄製相關變數
    let mediaRecorder;
    let audioChunks = [];

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        const time = new Date().toLocaleTimeString();
        box.innerHTML += `[${time}] ${type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ")}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    model_queue = data.models
                        .filter(m => {
                            const name = m.name.toLowerCase();
                            return name.includes('flash') && m.supportedGenerationMethods.includes('generateContent') &&
                                   !name.includes('tts') && !name.includes('image') && !name.includes('embedding');
                        })
                        .map(m => m.name).sort((a,b) => a.includes('3.1') ? -1 : 1);
                    log(`系統就緒，備援模型：${model_queue.length} 個`);
                    updateStatus(`Ready: ${model_queue[0].split('/')[1]}`, "ready");
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (e) { log("Key 驗證失敗", "err"); }
        }
    }

    function updateStatus(text, className) {
        const s = document.getElementById('statusTag');
        s.innerText = text; s.className = `status-tag ${className}`;
    }

    // 初始化語音辨識與聲音錄製
    async function setupRecorder() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 1. 聲音錄製 (MediaRecorder)
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                saveFile(audioBlob, "診間原音", "webm");
                audioChunks = []; // 清空緩衝
            };

            // 2. 文字辨識 (SpeechRecognition)
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('transcriptPreview').innerText = fullTranscript + interim;
            };
            return true;
        } catch (err) {
            log("無法取得麥克風權限: " + err.message, "err");
            return false;
        }
    }

    document.getElementById('startBtn').onclick = async () => {
        const ok = await setupRecorder();
        if (!ok) return;

        fullTranscript = "";
        audioChunks = [];
        recognition.start();
        mediaRecorder.start();
        
        document.getElementById('recDot').style.display = "inline";
        updateStatus("🔴 錄音錄字中...", "warning");
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('downloadBtn').style.display = "none";
    };

    document.getElementById('stopBtn').onclick = () => {
        recognition.stop();
        mediaRecorder.stop(); // 停止時會自動觸發存檔
        
        document.getElementById('recDot').style.display = "none";
        document.getElementById('stopBtn').disabled = true;
        current_model_index = 0;
        executeAnalysis();
    };

    async function executeAnalysis() {
        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        updateStatus(`⌛ AI 分析中 (${modelName})...`, "warning");

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請標註語者(醫師/病患/家屬)並整理成結構化問答紀錄：\n\n" + fullTranscript }] }]
                })
            });
            const data = await response.json();
            if (response.status === 200 && data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                updateStatus("✅ 分析成功", "ready");
                document.getElementById('startBtn').disabled = false;
                document.getElementById('downloadBtn').style.display = "inline-block";
                log(`AI 分析成功 (${modelName})`);
            } else {
                log(`${modelName} 擁堵，換路徑...`, "warn");
                current_model_index++;
                if (current_model_index < model_queue.length) setTimeout(executeAnalysis, 1500);
                else {
                    updateStatus("❌ AI 分析失敗 (錄音檔已存)", "fail");
                    document.getElementById('startBtn').disabled = false;
                }
            }
        } catch (err) { log("網路錯誤: " + err.message, "err"); }
    }

    function saveFile(blob, prefix, ext) {
        const now = new Date();
        const timeStr = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + "_" + ('0'+now.getHours()).slice(-2) + ('0'+now.getMinutes()).slice(-2);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${prefix}_${timeStr}.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        log(`✅ ${ext} 檔下載成功`);
    }

    function downloadTxt() {
        const content = document.getElementById('answer').innerText;
        const blob = new Blob([content], { type: 'text/plain' });
        saveFile(blob, "診間紀錄摘要", "txt");
    }
</script>
</body>
</html>
