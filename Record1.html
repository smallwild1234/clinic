<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 智慧備援與一鍵匯出</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .debug-box { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 12px; height: 150px; overflow-y: auto; margin: 15px 0; border: 1px solid #34495e; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fff; min-height: 150px; white-space: pre-wrap; line-height: 1.8; font-size: 1.1em; position: relative; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-right: 10px; margin-bottom: 10px; }
        .btn-key { background: #3498db; color: white; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-download { background: #6c5ce7; color: white; display: none; } /* 預設隱藏，分析完才出現 */
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        #transcriptPreview { font-style: italic; color: #7f8c8d; margin: 15px 0; padding: 10px; border-left: 4px solid #bdc3c7; background: #fdfdfd; min-height: 40px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (一鍵匯出 .txt 支援版)</h2>
    <div id="statusTag" class="status-tag fail">等待輸入 API Key</div>
    
    <div>
        <button onclick="inputKey()" class="btn-key">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-start" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ 3. 停止並分析</button>
        <button id="downloadBtn" class="btn-download" onclick="downloadTxt()">💾 4. 下載 .txt 紀錄</button>
    </div>

    <div id="debugOutput" class="debug-box">系統初始化...</div>
    <div id="transcriptPreview">錄音預覽會顯示在此...</div>
    
    <h3>💡 結構化摘要：</h3>
    <div id="answer">尚未分析。分析完成後，可點擊上方按鈕下載檔案。</div>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let current_model_index = 0;
    let recognition, fullTranscript = "";

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        const time = new Date().toLocaleTimeString();
        let prefix = type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ");
        box.innerHTML += `[${time}] ${prefix}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    model_queue = data.models
                        .filter(m => {
                            const name = m.name.toLowerCase();
                            return name.includes('flash') && 
                                   m.supportedGenerationMethods.includes('generateContent') &&
                                   !name.includes('tts') && !name.includes('image') && 
                                   !name.includes('embedding') && !name.includes('vision');
                        })
                        .map(m => m.name)
                        .sort((a, b) => {
                            if (a.includes('3.1')) return -1;
                            if (b.includes('3.1')) return 1;
                            return 0;
                        });

                    log(`已成功篩選 ${model_queue.length} 個可用對話模型`);
                    if(model_queue.length > 0) {
                        updateStatus(`系統就緒: ${model_queue[0].split('/')[1]}`, "ready");
                        document.getElementById('startBtn').disabled = false;
                    }
                }
            } catch (e) { log("Key 驗證失敗: " + e.message, "err"); }
        }
    }

    function updateStatus(text, className) {
        const s = document.getElementById('statusTag');
        s.innerText = text;
        s.className = `status-tag ${className}`;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcriptPreview').innerText = fullTranscript + interim;
        };
    }

    document.getElementById('startBtn').onclick = () => {
        fullTranscript = "";
        recognition.start();
        updateStatus("🔴 診間錄音中...", "warning");
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('downloadBtn').style.display = "none"; 
    };

    document.getElementById('stopBtn').onclick = async () => {
        if(recognition) recognition.stop();
        document.getElementById('stopBtn').disabled = true;
        current_model_index = 0; 
        await executeAnalysis();
    };

    async function executeAnalysis() {
        if (model_queue.length === 0) return;
        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        updateStatus(`⌛ 使用 ${modelName} 分析中...`, "warning");
        log(`嘗試呼叫路徑: ${modelName}`);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請辨認語者(醫師/病患/家屬)並整理成結構化問答紀錄，保留所有醫學關鍵資訊：\n\n" + fullTranscript }] }]
                })
            });
            const data = await response.json();
            if (response.status === 200 && data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                updateStatus("✅ 分析成功", "ready");
                log(`分析完成 (服務引擎: ${modelName})`);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('downloadBtn').style.display = "inline-block"; // 顯示下載按鈕
            } else {
                log(`${modelName} 擁堵，切換下一備援...`, "warn");
                current_model_index++;
                if (current_model_index < model_queue.length) setTimeout(executeAnalysis, 1500);
                else updateStatus("❌ 所有模型嘗試完畢", "fail");
            }
        } catch (err) { log("網路錯誤: " + err.message, "err"); }
    }

    // 核心功能：下載文字檔
    function downloadTxt() {
        const content = document.getElementById('answer').innerText;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        // 檔名加上時間戳記
        const now = new Date();
        const dateStr = now.getFullYear() + 
                       ('0' + (now.getMonth() + 1)).slice(-2) + 
                       ('0' + now.getDate()).slice(-2) + "_" +
                       ('0' + now.getHours()).slice(-2) + 
                       ('0' + now.getMinutes()).slice(-2);
        
        a.href = url;
        a.download = `診間紀錄_${dateStr}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        log("✅ .txt 文件下載成功");
    }
</script>
</body>
</html>
