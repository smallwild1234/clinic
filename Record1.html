<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 模型自適應穩定版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .status-tag { padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; display: inline-block; transition: 0.3s; }
        .idle { background: #e9ecef; color: #495057; }
        .ready { background: #d4edda; color: #155724; }
        .recording { background: #ffebee; color: #b71c1c; border: 1px solid #ffcdd2; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        #answer { border: 2px solid #28a745; padding: 20px; border-radius: 12px; background: #fff; min-height: 200px; white-space: pre-wrap; line-height: 1.8; font-size: 1.1em; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; transition: 0.3s; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .log-box { background: #1e1e1e; color: #00ff00; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 120px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #333; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (模型自適應音訊版)</h2>
    <div id="status" class="status-tag idle">1. 請設定 API Key</div>

    <div class="log-box" id="debugLog">系統初始化完成，等待 API Key...</div>

    <div>
        <button onclick="inputKey()" class="btn-blue">🔑 設定 API Key</button>
        <button id="startBtn" class="btn-green" disabled>🎤 開始錄音</button>
        <button id="stopBtn" class="btn-red" disabled>⏹️ 停止並自動分析</button>
    </div>

    <h3>💡 AI 診斷摘要 (含原始音訊解析)：</h3>
    <div id="answer">請在問診結束後點擊停止，AI 會自動掃描您的 API 權限，挑選最適模型並進行音訊轉文字與摘要。</div>
</div>

<script>
    let _USER_KEY = "";
    let auto_model_id = "";
    let mediaRecorder, audioChunks = [];

    function log(msg, type = "info") {
        const box = document.getElementById('debugLog');
        const prefix = type === "err" ? "❌ " : "✅ ";
        box.innerHTML += `[${new Date().toLocaleTimeString()}] ${prefix}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    // 1. 自動偵測模型邏輯
    async function inputKey() {
        const key = prompt("請貼入您的 Google API Key:");
        if (key) {
            _USER_KEY = key.trim();
            log("正在掃描可用模型權限...");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    // 優先尋找支援 Multimodal (音訊) 的模型
                    const found = data.models.find(m => m.name.includes('gemini-1.5-pro')) || 
                                  data.models.find(m => m.name.includes('gemini-1.5-flash')) ||
                                  data.models.find(m => m.name.includes('flash'));
                    
                    auto_model_id = found ? found.name : data.models[0].name;
                    
                    document.getElementById('status').innerText = `✅ 就緒: ${auto_model_id.split('/')[1]}`;
                    document.getElementById('status').className = "status-tag ready";
                    document.getElementById('startBtn').disabled = false;
                    log(`偵測成功！自動配對引擎：${auto_model_id}`);
                } else {
                    log("無法讀取模型清單，請確認 Key 是否正確。", "err");
                }
            } catch (e) { log("網路連線失敗，無法偵測模型。", "err"); }
        }
    }

    // 2. 錄音邏輯
    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                log("錄音結束，正將音訊轉為 Base64 格式...");
                
                // 轉碼並傳送
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const audioBase64 = reader.result.split(',')[1];
                    sendToGemini(audioBase64);
                };
            };

            audioChunks = [];
            mediaRecorder.start();
            document.getElementById('status').innerText = "🔴 診間錄音中...";
            document.getElementById('status').className = "status-tag recording";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            log("音訊採集軌道已鎖定。");
        } catch (err) { log("麥克風啟動失敗: " + err.message, "err"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        mediaRecorder.stop();
        document.getElementById('status').innerText = "⌛ 正在進行跨模態 AI 分析...";
        document.getElementById('status').className = "status-tag idle";
        document.getElementById('stopBtn').disabled = true;
    };

    // 3. 呼叫偵測到的模型
    async function sendToGemini(base64Data) {
        log(`發送音訊數據至 ${auto_model_id.split('/')[1]}...`);
        const url = `https://generativelanguage.googleapis.com/v1beta/${auto_model_id}:generateContent?key=${_USER_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "你是專業的醫學助理。這是一段診間錄音，請幫我：1. 轉譯對話內容並標註醫師與病患。 2. 整理一份標準的醫學摘要。 3. 列出初步診斷建議與處置建議。" },
                            { inlineData: { mimeType: "audio/webm", data: base64Data } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                log("🎉 摘要分析成功！");
                document.getElementById('startBtn').disabled = false;
            } else {
                log("分析異常：" + JSON.stringify(data.error || data), "err");
                document.getElementById('answer').innerText = "分析失敗，可能是音訊過長或模型限制。";
            }
        } catch (err) {
            log("API 請求失敗: " + err.message, "err");
        }
    }
</script>
</body>
</html>
