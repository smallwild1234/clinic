<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 長效不中斷錄製版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .debug-box { background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 120px; overflow-y: auto; margin-bottom: 15px; }
        #answer { border: 2px solid #28a745; padding: 20px; border-radius: 12px; background: #fff; min-height: 150px; white-space: pre-wrap; line-height: 1.8; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; }
        .btn-key { background: #3498db; color: white; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-download { background: #6c5ce7; color: white; }
        #transcriptPreview { font-style: italic; color: #7f8c8d; margin-bottom: 15px; border-left: 4px solid #3498db; padding-left: 10px; background: #f9f9f9; min-height: 60px; max-height: 200px; overflow-y: auto; }
        .recording-dot { color: red; animation: blink 1s infinite; display: none; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (長時錄製不中斷版)</h2>
    <div id="statusTag" class="status-tag fail">等待 API Key</div>
    <span id="recDot" class="recording-dot"> ● 錄音與辨識運行中</span>
    
    <div>
        <button onclick="inputKey()" class="btn-key">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-start" disabled>🎤 2. 開始問診</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ 3. 結束並分析</button>
        <button id="downloadBtn" class="btn-download" style="display:none;" onclick="downloadTxt()">💾 下載 AI 摘要</button>
    </div>

    <div id="debugOutput" class="debug-box">系統初始化...</div>
    <div id="transcriptPreview">即時辨識文字將顯示在此...</div>
    
    <h3>💡 結構化摘要：</h3>
    <div id="answer">點擊停止後，會自動下載聲音檔並開始 AI 分析。</div>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let current_model_index = 0;
    let recognition, fullTranscript = "";
    let isManualStop = false;
    
    let mediaRecorder;
    let audioChunks = [];

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        box.innerHTML += `[${new Date().toLocaleTimeString()}] ${type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ")}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                model_queue = data.models.filter(m => m.name.includes('flash') && m.supportedGenerationMethods.includes('generateContent') && !m.name.includes('tts'))
                             .map(m => m.name).sort((a,b) => a.includes('3.1') ? -1 : 1);
                updateStatus(`Ready: ${model_queue[0].split('/')[1]}`, "ready");
                document.getElementById('startBtn').disabled = false;
                log("系統就緒，已設定自動重啟機制");
            } catch (e) { log("Key 無效", "err"); }
        }
    }

    function updateStatus(text, className) {
        const s = document.getElementById('statusTag');
        s.innerText = text; s.className = `status-tag ${className}`;
    }

    // 初始化錄音與辨識
    async function initTools() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 聲音錄製
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                saveFile(blob, "診間原音", "webm");
                audioChunks = [];
            };

            // 語音辨識
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';

            recognition.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('transcriptPreview').innerText = fullTranscript + interim;
            };

            // 【核心修正】: 如果辨識意外停止，只要不是手動按停止，就自動重啟
            recognition.onend = () => {
                if (!isManualStop) {
                    log("辨識引擎重啟中...", "warn");
                    recognition.start();
                }
            };

            return true;
        } catch (err) {
            log("麥克風錯誤: " + err.message, "err");
            return false;
        }
    }

    document.getElementById('startBtn').onclick = async () => {
        isManualStop = false;
        const ok = await initTools();
        if (!ok) return;

        fullTranscript = "";
        audioChunks = [];
        recognition.start();
        mediaRecorder.start();
        
        document.getElementById('recDot').style.display = "inline";
        updateStatus("🔴 診間錄製中", "warning");
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
    };

    document.getElementById('stopBtn').onclick = () => {
        isManualStop = true;
        recognition.stop();
        mediaRecorder.stop();
        
        document.getElementById('recDot').style.display = "none";
        document.getElementById('stopBtn').disabled = true;
        current_model_index = 0;
        executeAnalysis();
    };

    async function executeAnalysis() {
        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        updateStatus(`⌛ AI 分析中 (${modelName})...`, "warning");

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請辨認語者(醫師/病患/家屬)並整理成結構化問答紀錄，保留醫學事實：\n\n" + fullTranscript }] }]
                })
            });
            const data = await response.json();
            if (response.status === 200 && data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                updateStatus("✅ 分析成功", "ready");
                document.getElementById('startBtn').disabled = false;
                document.getElementById('downloadBtn').style.display = "inline-block";
            } else {
                log(`${modelName} 擁擠，切換備援...`, "warn");
                current_model_index++;
                if (current_model_index < model_queue.length) executeAnalysis();
                else updateStatus("❌ AI 分析失敗", "fail");
            }
        } catch (err) { log("網路異常", "err"); }
    }

    function saveFile(blob, prefix, ext) {
        const now = new Date();
        const time = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2) + "_" + ('0'+now.getHours()).slice(-2) + ('0'+now.getMinutes()).slice(-2);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${prefix}_${time}.${ext}`;
        a.click();
    }

    function downloadTxt() {
        const blob = new Blob([document.getElementById('answer').innerText], { type: 'text/plain' });
        saveFile(blob, "診間摘要", "txt");
    }
</script>
</body>
</html>
