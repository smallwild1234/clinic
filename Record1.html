<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - AI 智慧備援版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; animation: pulse 1s infinite; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .debug-box { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 13px; height: 180px; overflow-y: auto; margin: 15px 0; border: 1px solid #34495e; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fff; min-height: 150px; white-space: pre-wrap; line-height: 1.8; font-size: 1.1em; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-right: 10px; }
        .btn-key { background: #3498db; color: white; }
        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; opacity: 0.7; }
        #transcriptPreview { font-style: italic; color: #7f8c8d; margin: 15px 0; padding: 10px; border-left: 4px solid #bdc3c7; background: #fdfdfd; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (AI 多路徑備援系統)</h2>
    <div id="statusTag" class="status-tag fail">等待輸入 API Key</div>
    
    <div>
        <button onclick="inputKey()" class="btn-key">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-start" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ 3. 停止並分析</button>
    </div>

    <div id="debugOutput" class="debug-box">系統初始化...</div>

    <div id="transcriptPreview">錄音內容預覽...</div>

    <h3>💡 診後結構化摘要 (NotebookLM 格式)：</h3>
    <div id="answer">尚未分析。</div>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let current_model_index = 0;
    let recognition, fullTranscript = "";

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        const time = new Date().toLocaleTimeString();
        let prefix = type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ");
        box.innerHTML += `[${time}] ${prefix}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    // 建立優先序隊列
                    const allFlash = data.models
                        .filter(m => m.name.includes('flash') && m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => m.name);
                    
                    // 排序策略：3.1 優先，其次 1.5，最後 2.5
                    model_queue = allFlash.sort((a, b) => {
                        if (a.includes('3.1')) return -1;
                        if (b.includes('3.1')) return 1;
                        if (a.includes('1.5')) return -1;
                        return 0;
                    });

                    log(`已載入 ${model_queue.length} 個可用備援路徑`);
                    updateStatus(`系統就緒: ${model_queue[0].split('/')[1]}`, "ready");
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (e) { log("Key 驗證失敗: " + e.message, "err"); }
        }
    }

    function updateStatus(text, className) {
        const s = document.getElementById('statusTag');
        s.innerText = text;
        s.className = `status-tag ${className}`;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcriptPreview').innerText = fullTranscript + interim;
        };
    }

    document.getElementById('startBtn').onclick = () => {
        fullTranscript = "";
        recognition.start();
        updateStatus("🔴 診間錄音中...", "warning");
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
    };

    document.getElementById('stopBtn').onclick = async () => {
        recognition.stop();
        document.getElementById('stopBtn').disabled = true;
        current_model_index = 0; // 重設回第一個模型開始嘗試
        await executeAnalysis();
    };

    async function executeAnalysis() {
        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        
        updateStatus(`⌛ 使用 ${modelName} 分析中...`, "warning");
        log(`嘗試呼叫路徑: ${modelName}`, "info");

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是醫療速記員，請辨認語者(醫師/病患/家屬)並整理成結構化問答紀錄，保留所有醫學關鍵資訊：\n\n" + fullTranscript }] }]
                })
            });

            const data = await response.json();

            if (response.status === 200 && data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                updateStatus("✅ 分析成功", "ready");
                log(`分析完成 (服務引擎: ${modelName})`);
                document.getElementById('startBtn').disabled = false;
            } else if (response.status === 503 || response.status === 429) {
                // 觸發備援機制
                log(`${modelName} 擁塞 (HTTP ${response.status})`, "warn");
                current_model_index++;
                
                if (current_model_index < model_queue.length) {
                    const nextModel = model_queue[current_model_index].split('/')[1];
                    updateStatus(`⚠️ 擁塞！自動轉向 ${nextModel}...`, "warning");
                    log(`切換至備援引擎: ${nextModel}`, "warn");
                    // 延遲兩秒重試，避開脈衝
                    setTimeout(executeAnalysis, 2000);
                } else {
                    updateStatus("❌ 所有 AI 路徑皆滿載", "fail");
                    log("已嘗試所有可用模型，皆無法提供服務。請等候 10 秒後手動重試。", "err");
                    document.getElementById('startBtn').disabled = false;
                }
            } else {
                log(`錯誤: ${data.error ? data.error.message : '未知錯誤'}`, "err");
                updateStatus("分析中斷", "fail");
            }
        } catch (err) { log("連線中斷: " + err.message, "err"); }
    }
</script>
</body>
</html>
