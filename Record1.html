<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 強制接力穩定版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f4f7f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        .ready { background: #d4edda; color: #155724; }
        .working { background: #fff3cd; color: #856404; border: 2px solid #ed8936; }
        .debug-box { background: #1e1e1e; color: #00ff00; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; margin-bottom: 15px; }
        #transcriptPreview { background: #fff; border: 1px solid #cbd5e0; padding: 15px; height: 200px; overflow-y: auto; margin-bottom: 15px; border-left: 5px solid #3182ce; }
        #answer { background: #fafffa; border: 2px solid #38a169; padding: 20px; border-radius: 12px; white-space: pre-wrap; line-height: 1.8; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-blue { background: #3182ce; color: white; }
        .btn-green { background: #38a169; color: white; }
        .btn-red { background: #e53e3e; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (接力辨識不中斷版)</h2>
    <div id="statusTag" class="status-tag ready">等待 API Key</div>
    
    <div style="margin-bottom:20px;">
        <button onclick="inputKey()" class="btn-blue">🔑 設定 API Key</button>
        <button id="startBtn" class="btn-green" disabled>🎤 開始問診 (自動接力)</button>
        <button id="stopBtn" class="btn-red" disabled>⏹️ 結束並分析</button>
    </div>

    <div class="debug-box" id="debugOutput">系統就緒。</div>

    <h3>👂 即時辨識文字 (每 55 秒自動刷新)：</h3>
    <div id="transcriptPreview">尚未錄音...</div>

    <h3>💡 AI 結構化摘要：</h3>
    <div id="answer">摘要將在此呈現...</div>
    <button id="downloadBtn" class="btn-blue" style="margin-top:10px; display:none;" onclick="downloadTxt()">💾 下載摘要 .txt</button>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let recognition, fullTranscript = "";
    let isRecording = false;
    let relayTimer; // 接力計時器
    
    let mediaRecorder, audioChunks = [];

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        box.innerHTML += `[${new Date().toLocaleTimeString()}] ${type === "err" ? "❌ " : "✅ "}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                model_queue = data.models.filter(m => m.name.includes('flash') && m.supportedGenerationMethods.includes('generateContent') && !m.name.includes('tts'))
                             .map(m => m.name).sort((a,b) => a.includes('3.1') ? -1 : 1);
                document.getElementById('statusTag').innerText = "✅ 系統就緒";
                document.getElementById('startBtn').disabled = false;
                log("API 已連線，已配置 55 秒強制接力邏輯");
            } catch (e) { log("Key 驗證失敗", "err"); }
        }
    }

    // 核心：接力式辨識引擎
    function startRelayRecognition() {
        if (!isRecording) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (recognition) {
            recognition.onend = null; // 暫時移除自動重啟，改由計時器控制
            recognition.stop();
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';

        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcriptPreview').innerText = fullTranscript + interim;
        };

        recognition.onstart = () => { log("接力辨識中..."); };
        
        recognition.onend = () => {
            if (isRecording) {
                log("辨識週期結束，嘗試自動下一棒...");
                setTimeout(startRelayRecognition, 300);
            }
        };

        try { recognition.start(); } catch(e) { log("啟動失敗，重試中...", "err"); }
    }

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                saveFile(new Blob(audioChunks, { type: 'audio/webm' }), "診間原音", "webm");
            };

            fullTranscript = ""; audioChunks = [];
            isRecording = true;
            mediaRecorder.start();
            
            // 啟動接力
            startRelayRecognition();
            
            // 【核心計時器】: 每 55 秒強制換下一棒，預防瀏覽器 60 秒殺掉連線
            relayTimer = setInterval(() => {
                if (isRecording) {
                    log("⏱️ 到達 55 秒限制，強制切換下一棒...");
                    startRelayRecognition();
                }
            }, 55000);

            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('statusTag').innerText = "🔴 接力錄製中";
            document.getElementById('statusTag').className = "status-tag working";
        } catch (err) { log("權限失敗: " + err.message, "err"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        isRecording = false;
        clearInterval(relayTimer);
        if (recognition) recognition.stop();
        mediaRecorder.stop();
        document.getElementById('stopBtn').disabled = true;
        executeAnalysis();
    };

    async function executeAnalysis() {
        const modelPath = model_queue[0];
        document.getElementById('statusTag').innerText = "⌛ AI 分析中...";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請整理成結構化醫學紀錄，標註語者：\n\n" + fullTranscript }] }]
                })
            });
            const data = await response.json();
            if (data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                document.getElementById('statusTag').innerText = "✅ 分析完成";
                document.getElementById('statusTag').className = "status-tag ready";
                document.getElementById('downloadBtn').style.display = "inline-block";
                document.getElementById('startBtn').disabled = false;
            }
        } catch (err) { log("通訊失敗", "err"); }
    }

    function saveFile(blob, prefix, ext) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${prefix}_${new Date().getTime()}.${ext}`;
        a.click();
    }

    function downloadTxt() {
        saveFile(new Blob([document.getElementById('answer').innerText], { type: 'text/plain' }), "診間摘要", "txt");
    }
</script>
</body>
</html>
