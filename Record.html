<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 抗塞車穩定版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .debug-box { background: #222; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow: auto; max-height: 200px; margin-top: 10px; }
        .status-tag { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; }
        .ready { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        #answer { border: 2px solid #28a745; padding: 15px; min-height: 100px; white-space: pre-wrap; background: #fff; margin-top: 15px; line-height: 1.8; }
        button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        #startBtn { background: #007bff; color: white; }
        #stopBtn { background: #dc3545; color: white; }
        #startBtn:disabled, #stopBtn:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (抗塞車自動修復版)</h2>
    <div id="statusTag" class="status-tag fail">請設定 API Key</div>
    
    <div>
        <button onclick="inputKey()" style="background:#5bc0de; color:white;">🔑 1. 設定 API Key</button>
        <button id="startBtn" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" disabled>⏹️ 3. 停止並分析</button>
    </div>

    <div id="debugOutput" class="debug-box">系統準備就緒...</div>

    <div id="transcriptPreview" style="color:#666; font-size: 14px; margin: 15px 0; min-height: 50px; border: 1px dashed #ccc; padding: 10px;">尚未錄音內容</div>

    <h3>💡 AI 整理結果 (結構化紀錄)：</h3>
    <div id="answer">尚未分析。</div>
</div>

<script>
    let _USER_KEY = "";
    let auto_model_id = "";
    let model_list = [];
    let recognition, fullTranscript = "";

    function logDebug(msg) {
        const box = document.getElementById('debugOutput');
        box.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入您的 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    // 過濾出所有支援內容生成的 Flash 模型
                    model_list = data.models
                        .filter(m => m.name.includes('flash') && m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => m.name);
                    
                    // 優先權：3.1 > 1.5 > 2.5 (避開目前塞車嚴重的 2.5)
                    auto_model_id = model_list.find(m => m.includes('3.1')) || 
                                    model_list.find(m => m.includes('1.5')) || 
                                    model_list[0];

                    logDebug(`✅ 連線成功！主選模型: ${auto_model_id}`);
                    document.getElementById('statusTag').innerText = "系統就緒: " + auto_model_id.split('/')[1];
                    document.getElementById('statusTag').className = "status-tag ready";
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (e) { logDebug("❌ 連線錯誤: " + e.message); }
        }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcriptPreview').innerText = fullTranscript + interim;
        };
    }

    document.getElementById('startBtn').onclick = () => {
        fullTranscript = "";
        recognition.start();
        logDebug("🎤 診間錄製開始...");
        document.getElementById('statusTag').innerText = "錄音中...";
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
    };

    document.getElementById('stopBtn').onclick = async () => {
        recognition.stop();
        logDebug("⏹️ 錄音結束，啟動 AI 智慧整理...");
        document.getElementById('stopBtn').disabled = true;
        await callGeminiWithRetry(auto_model_id);
    };

    // 核心：遇到 503 塞車時自動換模型重試
    async function callGeminiWithRetry(modelPath) {
        const url = `https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`;
        logDebug(`嘗試呼叫: ${modelPath.split('/')[1]}...`);

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "你是專業醫療助理，請根據語氣標註語者(醫師/病患/家屬)並整理成結構化問答紀錄：\n\n" + fullTranscript }] }]
                })
            });

            const data = await response.json();

            if (response.status === 200 && data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                logDebug("🎉 分析成功完成！");
                document.getElementById('statusTag').innerText = "完成";
                document.getElementById('startBtn').disabled = false;
            } else if (response.status === 503 || response.status === 429) {
                logDebug(`⚠️ ${modelPath.split('/')[1]} 塞車中... 嘗試備援模型...`);
                // 找清單中下一個不同的模型
                const nextModel = model_list.find(m => m !== modelPath) || model_list[0];
                if (nextModel !== modelPath) {
                    setTimeout(() => callGeminiWithRetry(nextModel), 2000);
                } else {
                    logDebug("❌ 所有模型皆處於高峰期，請等 30 秒後手動重試。");
                }
            } else {
                logDebug("❌ 錯誤: " + (data.error ? data.error.message : "未知錯誤"));
            }
        } catch (err) { logDebug("❌ 連線異常: " + err.message); }
    }
</script>
</body>
</html>
