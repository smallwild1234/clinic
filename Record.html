<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄採集器 - NotebookLM 專用</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; line-height: 1.6; background-color: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .recording { color: red; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #answer { background: #e9ecef; padding: 20px; border-radius: 8px; white-space: pre-wrap; margin-top: 20px; border: 1px solid #dee2e6; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; margin-right: 10px; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-key { background: #6c757d; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間對話採集器</h2>
    <div id="status">請先輸入 API Key</div>
    <button class="btn-key" onclick="inputKey()">🔑 輸入 API Key</button>
    <hr>
    
    <div>
        <button id="startBtn" class="btn-start" disabled>🎤 開始問診</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ 結束分析</button>
    </div>

    <div id="recIndicator" style="display:none; margin-top:10px;">
        <span class="recording">● REC</span> 正在記錄診間對話...
    </div>

    <h3>📝 對話摘要 (整理後)：</h3>
    <div id="answer">分析結果將在此呈現，您可以直接複製到 NotebookLM。</div>
</div>

<script>
    let _USER_KEY = "";
    let auto_model_id = "";
    let recognition, fullTranscript = "";

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
            const data = await res.json();
            if (data.models) {
                auto_model_id = data.models.find(m => m.name.includes('flash'))?.name || data.models[0].name;
                document.getElementById('status').innerText = "✅ 系統就緒";
                document.getElementById('startBtn').disabled = false;
            }
        }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + "\n";
            }
        };
    }

    document.getElementById('startBtn').onclick = () => {
        fullTranscript = "";
        recognition.start();
        document.getElementById('recIndicator').style.display = 'block';
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
    };

    document.getElementById('stopBtn').onclick = async () => {
        recognition.stop();
        document.getElementById('recIndicator').style.display = 'none';
        document.getElementById('answer').innerText = "⌛ AI 正在標註語者並整理結構化紀錄...";

        const url = `https://generativelanguage.googleapis.com/v1beta/${auto_model_id}:generateContent?key=${_USER_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: "你是一位專業的診間速記員。以下是一段未經整理的醫病對話原始文字。請根據語氣與內容，自動標註誰是『醫師』、誰是『病患』或『家屬』，並整理成一份結構清晰、適合放入 NotebookLM 知識庫的問答紀錄。\n\n【原始對話】：\n" + fullTranscript 
                        }]
                    }]
                })
            });
            const data = await response.json();
            document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
        } catch (err) { alert("分析失敗"); }
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    };
</script>
</body>
</html>
