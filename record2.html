<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診間紀錄 - 專業醫療存檔版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status-tag { display: inline-block; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .debug-box { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 180px; overflow-y: auto; margin: 15px 0; border: 1px solid #333; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fff; min-height: 200px; white-space: pre-wrap; line-height: 1.8; font-size: 1.1em; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; transition: 0.2s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-save { background: #6c5ce7; color: white; display: none; } /* 下載鈕初始隱藏 */
        button:disabled { background: #bdc3c7 !important; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 診間紀錄 (錄音備份 + AI 摘要存檔)</h2>
    <div id="statusTag" class="status-tag fail">等待輸入 API Key</div>
    
    <div>
        <button onclick="inputKey()" class="btn-blue">🔑 1. 設定 API Key</button>
        <button id="startBtn" class="btn-green" disabled>🎤 2. 開始錄音</button>
        <button id="stopBtn" class="btn-red" disabled>⏹️ 3. 停止並分析</button>
    </div>

    <div id="debugOutput" class="debug-box">系統準備就緒...</div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <h3>💡 AI 診斷與摘要：</h3>
        <button id="downloadTxtBtn" class="btn-save" onclick="downloadSummary()">💾 下載摘要文字 (.txt)</button>
    </div>
    
    <div id="answer">問診結束後，AI 會自動測試所有模型，分析完成後即可下載摘要。</div>
</div>

<script>
    let _USER_KEY = "";
    let model_queue = [];
    let current_model_index = 0;
    let mediaRecorder, audioChunks = [];
    let lastAudioBase64 = "";

    function log(msg, type = "info") {
        const box = document.getElementById('debugOutput');
        const time = new Date().toLocaleTimeString();
        let prefix = type === "err" ? "❌ " : (type === "warn" ? "⚠️ " : "✅ ");
        box.innerHTML += `[${time}] ${prefix}${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    async function inputKey() {
        const key = prompt("請貼入 API Key:");
        if (key) {
            _USER_KEY = key.trim();
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                if (data.models) {
                    // 自動排序：優先考慮 Flash 3.1 和 1.5 系列
                    model_queue = data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent') && !m.name.includes('tts'))
                        .map(m => m.name)
                        .sort((a, b) => {
                            if (a.includes('3.1')) return -1;
                            if (a.includes('1.5')) return -1;
                            return 1;
                        });

                    log(`已載入 ${model_queue.length} 個可用 AI 模型`);
                    updateStatus(`系統就緒: ${model_queue[0].split('/')[1]}`, "ready");
                    document.getElementById('startBtn').disabled = false;
                }
            } catch (e) { log("Key 驗證失敗，請檢查網路或 Key 權限", "err"); }
        }
    }

    function updateStatus(text, className) {
        const s = document.getElementById('statusTag');
        s.innerText = text; s.className = `status-tag ${className}`;
    }

    document.getElementById('startBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                
                // --- 1. 下載聲音檔 ---
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                a.href = url; a.download = `診間原音_${timestamp}.webm`;
                a.click();
                log(`聲音檔存檔完成 (${a.download})`);

                // --- 2. 轉碼給 AI ---
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    lastAudioBase64 = reader.result.split(',')[1];
                    current_model_index = 0;
                    document.getElementById('downloadTxtBtn').style.display = "none"; // 重啟分析時先隱藏下載鈕
                    executeChainAnalysis();
                };
            };

            audioChunks = [];
            mediaRecorder.start();
            updateStatus("🔴 診間錄製中...", "warning");
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            log("錄音已啟動，請開始問診。");
        } catch (err) { log("麥克風錯誤: " + err.message, "err"); }
    };

    document.getElementById('stopBtn').onclick = () => {
        mediaRecorder.stop();
        document.getElementById('stopBtn').disabled = true;
    };

    async function executeChainAnalysis() {
        if (current_model_index >= model_queue.length) {
            updateStatus("❌ 分析失敗 (所有引擎皆滿載)", "fail");
            log("所有可用模型皆回報 503 或忙碌，請稍後手動重試。", "err");
            document.getElementById('startBtn').disabled = false;
            return;
        }

        const modelPath = model_queue[current_model_index];
        const modelName = modelPath.split('/')[1];
        updateStatus(`⌛ 測試引擎: ${modelName}...`, "warning");
        log(`嘗試模型 ${current_model_index + 1}/${model_queue.length}: ${modelName}`);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${_USER_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "你是專業醫療助理。請先將錄音轉為文字並標註語者(醫師/病患)，然後整理成標準醫學摘要(包含主訴、現病史、處置建議)。" },
                            { inlineData: { mimeType: "audio/webm", data: lastAudioBase64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (response.status === 200 && data.candidates) {
                const resultText = data.candidates[0].content.parts[0].text;
                document.getElementById('answer').innerText = resultText;
                updateStatus("✅ AI 分析完成", "ready");
                log(`🎉 ${modelName} 分析成功！`);
                document.getElementById('downloadTxtBtn').style.display = "block"; // 顯示下載鈕
                document.getElementById('startBtn').disabled = false;
            } else {
                log(`${modelName} 忙碌中，切換下一路徑...`, "warn");
                current_model_index++;
                setTimeout(executeChainAnalysis, 500); 
            }
        } catch (err) {
            log(`${modelName} 連線異常，跳轉中...`, "warn");
            current_model_index++;
            executeChainAnalysis();
        }
    }

    // --- 新增：下載 TXT 檔案功能 ---
    function downloadSummary() {
        const text = document.getElementById('answer').innerText;
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `診間摘要_${timestamp}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        log("✅ 摘要 TXT 下載成功");
    }
</script>
</body>
</html>
