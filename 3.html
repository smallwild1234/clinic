<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診斷助手 - 雙模全功能版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        .input-area { width: 100%; height: 150px; border: 1px solid #ddd; padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; resize: vertical; }
        #transcript { border: 1px solid #ddd; padding: 15px; height: 100px; overflow-y: auto; background: #fff; border-radius: 8px; margin-bottom: 15px; white-space: pre-wrap; font-size: 14px; color: #555; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fafffa; white-space: pre-wrap; font-size: 1.1em; line-height: 1.8; min-height: 100px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin-right: 10px; transition: 0.2s; margin-top: 5px; }
        .btn-key { background-color: #5bc0de; color: white; margin-bottom: 20px; width: 100%; }
        #startBtn { background-color: #007bff; color: white; }
        #stopBtn { background-color: #dc3545; color: white; }
        #analyzeBtn { background-color: #28a745; color: white; float: right; }
        button:disabled { background-color: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        .status-bar { font-weight: bold; color: #d9534f; margin-bottom: 10px; display: block; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 醫師診斷輔助 (語音/文字雙模版)</h2>
    <span id="status" class="status-bar">⚠️ 系統尚未啟用：請先輸入 API Key</span>

    <button class="btn-key" id="keyBtn">🔑 第一步：輸入 API Key 以啟動系統</button>

    <div class="section">
        <strong>2. 載入醫學知識庫 (.txt)：</strong><br><br>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="section">
        <strong>3. 輸入或錄製診間對話：</strong><br><br>
        <textarea id="manualInput" class="input-area" placeholder="在此貼上病歷文字、檢驗數據或直接輸入對話..."></textarea>
        
        <div class="controls clearfix">
            <button id="startBtn" disabled>🎤 開始錄音</button>
            <button id="stopBtn" disabled>⏹️ 停止錄音</button>
            <button id="analyzeBtn" disabled>🚀 啟動 AI 分析</button>
        </div>
    </div>

    <h3>👂 錄音轉譯文字：</h3>
    <div id="transcript">尚未錄音...</div>

    <h3>💡 AI 診斷建議與處置方案：</h3>
    <div id="answer">尚未分析。</div>
</div>

<script>
    let _USER_KEY = "";
    let auto_model_id = "";
    let recognition, fullTranscript = "", uploadedKnowledge = "";

    const statusSpan = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const keyBtn = document.getElementById('keyBtn');

    // 1. 啟動 API Key 按鈕
    keyBtn.onclick = async function() {
        const key = prompt("請貼入您的 Google API Key (AIzaSy...):");
        if (key && key.trim() !== "") {
            _USER_KEY = key.trim();
            statusSpan.innerText = "⌛ 正在驗證 Key 並連結 Gemini 3.1 引擎...";
            statusSpan.style.color = "blue";
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_USER_KEY}`);
                const data = await res.json();
                
                if (data.models) {
                    const found = data.models.find(m => m.name.includes('gemini-3.1-flash')) ||
                                  data.models.find(m => m.name.includes('gemini-3-flash')) ||
                                  data.models.find(m => m.name.includes('flash'));
                    
                    auto_model_id = found ? found.name : data.models[0].name;
                    
                    statusSpan.innerText = "✅ 系統已啟動！使用模型: " + auto_model_id.split('/')[1];
                    statusSpan.style.color = "green";
                    
                    // 關鍵修正：強制啟用所有功能按鈕
                    startBtn.disabled = false;
                    analyzeBtn.disabled = false;
                    keyBtn.innerText = "🔑 Key 已生效 (點擊可更換)";
                    keyBtn.style.backgroundColor = "#28a745";
                } else {
                    statusSpan.innerText = "❌ Key 無效，請確認後重新輸入。";
                    statusSpan.style.color = "red";
                }
            } catch (e) { 
                statusSpan.innerText = "❌ 連線失敗，請檢查網路。";
                statusSpan.style.color = "red";
            }
        }
    };

    // 2. 語音辨識
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript;
                else interim += e.results[i][0].transcript;
            }
            document.getElementById('transcript').innerText = fullTranscript + interim;
        };
    }

    // 3. 知識庫處理
    document.getElementById('fileInput').onchange = (e) => {
        uploadedKnowledge = "";
        let count = 0;
        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                uploadedKnowledge += `\n--- 知識庫: ${file.name} ---\n${ev.target.result}\n`;
                if (++count === e.target.files.length) {
                    statusSpan.innerText = "✅ 知識庫載入完成";
                }
            };
            reader.readAsText(file);
        }
    };

    // 4. 錄音操作邏輯
    startBtn.onclick = () => {
        if (!recognition) return alert("瀏覽器不支援錄音");
        fullTranscript = "";
        document.getElementById('transcript').innerText = "";
        recognition.start();
        statusSpan.innerText = "🔴 診間錄音中...";
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
        if(recognition) { try { recognition.stop(); } catch(e) {} }
        statusSpan.innerText = "✅ 錄音完畢，可點擊「啟動分析」";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    // 5. 獨立分析邏輯
    analyzeBtn.onclick = async () => {
        if (!_USER_KEY) return alert("請先輸入 API Key");
        
        statusSpan.innerText = "⌛ AI 正在深度運算中...";
        analyzeBtn.disabled = true;
        
        const manualText = document.getElementById('manualInput').value;
        const combinedDialogue = `[手動輸入]:\n${manualText}\n\n[錄音轉譯]:\n${fullTranscript}`;

        const url = `https://generativelanguage.googleapis.com/v1beta/${auto_model_id}:generateContent?key=${_USER_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: "你是精通醫學的助手。請根據以下知識庫分析對話，給予診斷建議與處置方案。\n\n【醫學知識庫】:\n" + uploadedKnowledge + "\n\n【對話內容】:\n" + combinedDialogue 
                        }]
                    }]
                })
            });
            const data = await response.json();
            
            if (data.candidates) {
                document.getElementById('answer').innerText = data.candidates[0].content.parts[0].text;
                statusSpan.innerText = "✅ 分析完成";
            } else {
                document.getElementById('answer').innerText = "分析錯誤：" + JSON.stringify(data.error || data);
            }
        } catch (err) {
            alert("API 連線失敗");
        }
        analyzeBtn.disabled = false;
    };
</script>
</body>
</html>
