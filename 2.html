<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診斷助手 - 模型掃描版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #modelList { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; border-radius: 5px; margin: 10px 0; display: none; }
        #answer { border: 2px solid #28a745; padding: 15px; background: #f9fff9; white-space: pre-wrap; margin-top: 15px; }
        button { padding: 12px 20px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-scan { background: #6f42c1; color: white; }
        .btn-rec { background: #007bff; color: white; }
        .btn-stop { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 醫師診斷助手 (模型掃描修復版)</h2>
    
    <div style="margin-bottom:15px;">
        <button class="btn-scan" onclick="checkAvailableModels()">🔍 第一步：掃描可用模型</button>
        <span id="scanStatus"></span>
    </div>
    <div id="modelList"></div>

    <div style="margin-bottom:15px;">
        <strong>第二步：載入知識庫 (.txt)</strong><br>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="controls">
        <button class="btn-rec" id="startBtn">🎤 第三步：開始錄音</button>
        <button class="btn-stop" id="stopBtn" disabled>⏹️ 停止並分析</button>
    </div>

    <div id="transcript" style="border:1px solid #ccc; padding:10px; margin:10px 0; height:100px; overflow:auto;"></div>
    <div id="answer">分析結果將顯示在此...</div>
</div>

<script>
    const API_KEY = 'AIzaSyAaOZyLZVjVVtejkvsdAfaQNn2m3mAK0rs'; 
    let selectedModel = 'gemini-1.5-flash'; // 預設值

    async function checkAvailableModels() {
        const status = document.getElementById('scanStatus');
        const listDiv = document.getElementById('modelList');
        status.innerText = "正在連線 Google API...";
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
            const data = await response.json();
            
            if (data.models) {
                const names = data.models.map(m => m.name.replace('models/', ''));
                listDiv.style.display = 'block';
                listDiv.innerText = "您的 Key 可用的模型清單：\n" + names.join('\n');
                
                // 自動選擇清單中最新的一個 Flash 模型
                const flashModel = names.find(n => n.includes('3-flash')) || names.find(n => n.includes('1.5-flash')) || names[0];
                selectedModel = flashModel;
                status.innerText = "✅ 掃描成功！已自動選擇最強模型: " + selectedModel;
            } else {
                status.innerText = "❌ 掃描失敗，Key 可能有誤或未完全啟用。";
            }
        } catch (e) {
            status.innerText = "❌ 連線失敗: " + e.message;
        }
    }

    // --- 錄音與分析邏輯 ---
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptDiv = document.getElementById('transcript');
    const answerDiv = document.getElementById('answer');
    const fileInput = document.getElementById('fileInput');
    let recognition, fullTranscript = "", uploadedKnowledge = "";

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript;
                else interim += e.results[i][0].transcript;
            }
            transcriptDiv.innerHTML = fullTranscript + '<span style="color:gray">' + interim + '</span>';
        };
    }

    fileInput.onchange = (e) => {
        uploadedKnowledge = "";
        let count = 0;
        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                uploadedKnowledge += ev.target.result + "\n";
            };
            reader.readAsText(file);
        }
    };

    startBtn.onclick = () => { recognition.start(); startBtn.disabled = true; stopBtn.disabled = false; };

    stopBtn.onclick = async () => {
        recognition.stop();
        answerDiv.innerText = `使用模型 ${selectedModel} 分析中...`;
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${API_KEY}`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "知識庫：\n" + uploadedKnowledge + "\n對話：\n" + fullTranscript }] }]
                })
            });
            const data = await response.json();
            answerDiv.innerText = data.candidates ? data.candidates[0].content.parts[0].text : JSON.stringify(data);
        } catch (err) { answerDiv.innerText = "連線失敗"; }
        startBtn.disabled = false;
    };
</script>
</body>
</html>
