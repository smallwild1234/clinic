<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診斷助手 - Gemini 3.1 終極版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        #transcript { border: 1px solid #ddd; padding: 15px; height: 150px; overflow-y: auto; background: #fff; border-radius: 8px; margin-bottom: 20px; line-height: 1.6; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fafffa; white-space: pre-wrap; font-size: 1.1em; line-height: 1.8; color: #1a531b; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        #startBtn { background-color: #007bff; color: white; }
        #stopBtn { background-color: #dc3545; color: white; margin-left: 10px; }
        button:disabled { background-color: #ccc !important; }
        .status-bar { font-weight: bold; color: #007bff; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 醫師診斷決策輔助 (Gemini 3.1 Pro)</h2>
    
    <span id="status" class="status-bar">系統初始化中...</span>

    <div class="section">
        <strong>1. 載入醫學知識庫 (.txt)：</strong><br><br>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="controls">
        <button id="startBtn">🎤 開始診間錄音</button>
        <button id="stopBtn" disabled>⏹️ 停止並分析</button>
    </div>

    <h3>👂 即時對話紀錄：</h3>
    <div id="transcript"></div>

    <h3>💡 AI 診斷與處置建議：</h3>
    <div id="answer">等待分析...</div>
</div>

<script>
    // 🔑 API Key
    const API_KEY = 'AIzaSyAaOZyLZVjVVtejkvsdAfaQNn2m3mAK0rs'; 
    // 從您的掃描清單中選取最強的 3.1 Pro 模型
    const MODEL_ID = 'gemini-3.1-pro-preview'; 

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptDiv = document.getElementById('transcript');
    const answerDiv = document.getElementById('answer');
    const statusSpan = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    let recognition, fullTranscript = "", uploadedKnowledge = "";

    // 1. 初始化語音
    try {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript;
                else interim += e.results[i][0].transcript;
            }
            transcriptDiv.innerHTML = fullTranscript + '<span style="color:gray">' + interim + '</span>';
            transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
        };
        statusSpan.innerText = "✅ 系統就緒 (已連線: " + MODEL_ID + ")";
    } catch (e) { statusSpan.innerText = "❌ 瀏覽器不支援語音"; }

    // 2. 知識庫載入
    fileInput.onchange = (e) => {
        uploadedKnowledge = "";
        let count = 0;
        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                uploadedKnowledge += `\n--- 知識庫文件: ${file.name} ---\n${ev.target.result}\n`;
                if (++count === e.target.files.length) statusSpan.innerText = "✅ 知識庫載入完成";
            };
            reader.readAsText(file);
        }
    };

    // 3. 錄音控制
    startBtn.onclick = () => {
        fullTranscript = "";
        transcriptDiv.innerText = "";
        recognition.start();
        statusSpan.innerText = "🔴 診間錄製中...";
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    stopBtn.onclick = async () => {
        recognition.stop();
        statusSpan.innerText = "⌛ Gemini 3.1 正在深度分析知識庫與對話...";
        stopBtn.disabled = true;
        await getDiagnosis();
    };

    // 4. 核心分析
    async function getDiagnosis() {
        // 使用您清單中證實存在的 v1beta 路徑
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: "你是一位精通多國語言的專業醫療大腦。請深入研究以下提供的『知識庫』內容，並結合『診間對話』給予醫師最精確的臨床建議、可能的診斷代碼及處置方案。\n\n【醫學知識庫內容】:\n" + uploadedKnowledge + "\n\n【醫病對話紀錄】:\n" + fullTranscript 
                        }]
                    }]
                })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                answerDiv.innerText = data.candidates[0].content.parts[0].text;
                statusSpan.innerText = "✅ 診斷生成完畢";
            } else {
                answerDiv.innerText = "分析異常：" + JSON.stringify(data.error || data);
            }
        } catch (err) {
            answerDiv.innerText = "連線失敗：" + err.message;
        }
        startBtn.disabled = false;
    }
</script>
</body>
</html>
