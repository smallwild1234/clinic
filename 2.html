    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { background: #e8f4fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff; }

        .controls { margin-bottom: 20px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        #startBtn { background-color: #007bff; color: white; }
        #startBtn:disabled { background-color: #aaa; cursor: not-allowed; }
        #stopBtn { background-color: #dc3545; color: white; margin-left: 10px; }
        #stopBtn:disabled { background-color: #eee; color: #999; }
        .status-tag { font-size: 0.9em; font-weight: bold; margin-left: 15px; color: #007bff; }
    </style>
</head>

</div>
