<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診斷助手 - 醫師專用</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #transcript { border: 1px solid #ddd; padding: 15px; height: 150px; overflow-y: auto; background: #fff; margin: 15px 0; border-radius: 6px; }
        #answer { border: 2px solid #28a745; padding: 20px; border-radius: 10px; background: #f9fff9; white-space: pre-wrap; min-height: 150px; line-height: 1.6; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        #startBtn { background-color: #007bff; color: white; }
        #stopBtn { background-color: #dc3545; color: white; margin-left: 10px; }
        button:disabled { background-color: #ccc !important; }
        .status-tag { margin-left: 10px; font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 醫師診斷助手 (Gemini 3 Flash)</h2>

    <div style="margin-bottom:20px;">
        <strong>1. 載入知識庫 (.txt)：</strong>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="controls">
        <button id="startBtn">🎤 開始錄音</button>
        <button id="stopBtn" disabled>⏹️ 停止並分析</button>
        <span id="status" class="status-tag">系統就緒</span>
    </div>

    <h3>👂 錄音文字：</h3>
    <div id="transcript"></div>

    <h3>💡 AI 診斷建議：</h3>
    <div id="answer">尚未分析。</div>
</div>

<script>
    // ==========================================
    // 🔑 請務必填入您在 AI Studio 申請到的最新 API Key
    // ==========================================
    const API_KEY = 'AIzaSyAaOZyLZVjVVtejkvsdAfaQNn2m3mAK0rs'; 

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptDiv = document.getElementById('transcript');
    const answerDiv = document.getElementById('answer');
    const statusSpan = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    let recognition;
    let fullTranscript = "";
    let uploadedKnowledge = "";

    // 1. 初始化語音辨識
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript;
                else interim += e.results[i][0].transcript;
            }
            transcriptDiv.innerHTML = fullTranscript + '<span style="color:gray">' + interim + '</span>';
        };
    }

    // 2. 檔案讀取
    fileInput.onchange = (e) => {
        uploadedKnowledge = "";
        let files = e.target.files;
        let count = 0;
        for (let file of files) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                uploadedKnowledge += `\n[文件:${file.name}]\n${ev.target.result}\n`;
                if (++count === files.length) statusSpan.innerText = "✅ 知識庫已就緒";
            };
            reader.readAsText(file);
        }
    };

    // 3. 按鈕邏輯
    startBtn.onclick = () => {
        if (!recognition) return alert("瀏覽器不支援錄音");
        fullTranscript = "";
        transcriptDiv.innerText = "";
        recognition.start();
        statusSpan.innerText = "🔴 錄音中...";
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    stopBtn.onclick = async () => {
        try { recognition.stop(); } catch(e) {}
        statusSpan.innerText = "⌛ 分析中...";
        stopBtn.disabled = true;
        await getDiagnosis();
    };

    // 4. API 呼叫 (回歸 v1beta 並使用正確的 Flash 名稱)
    async function getDiagnosis() {
        // 在 v1beta 路徑下，這個名稱是 2026 年最穩定的
        const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: "你是一位專業醫療助手。請根據以下知識庫分析對話內容並給予醫師建議。\n\n【知識庫內容】：\n" + uploadedKnowledge + "\n\n【醫病對話內容】：\n" + fullTranscript 
                        }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                answerDiv.innerText = data.candidates[0].content.parts[0].text;
                statusSpan.innerText = "✅ 分析完成";
            } else {
                // 如果失敗，顯示 Google 回傳的原始訊息供排除錯誤
                answerDiv.innerText = "分析失敗，錯誤代碼：" + (data.error ? data.error.message : "未知錯誤");
                console.log("Debug Info:", data);
            }
        } catch (err) {
            answerDiv.innerText = "連線失敗：" + err.message;
        }
        startBtn.disabled = false;
    }
</script>
</body>
</html>
