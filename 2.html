<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診斷助手 - 安全加密版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        #transcript { border: 1px solid #ddd; padding: 15px; height: 150px; overflow-y: auto; background: #fff; border-radius: 8px; margin-bottom: 20px; }
        #answer { border: 2px solid #28a745; padding: 25px; border-radius: 12px; background: #fafffa; white-space: pre-wrap; font-size: 1.1em; line-height: 1.8; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        #startBtn { background-color: #007bff; color: white; }
        #stopBtn { background-color: #dc3545; color: white; margin-left: 10px; }
        button:disabled { background-color: #ccc !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🩺 醫師診斷輔助 (Gemini 3.1 安全防護版)</h2>
    <div id="status" style="font-weight:bold; color:blue; margin-bottom:10px;">系統就緒</div>

    <div class="section">
        <strong>1. 載入醫學知識庫 (.txt)：</strong><br><br>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="controls">
        <button id="startBtn">🎤 開始錄音</button>
        <button id="stopBtn" disabled>⏹️ 停止並分析</button>
    </div>

    <h3>👂 對話紀錄：</h3>
    <div id="transcript"></div>

    <h3>💡 診斷建議：</h3>
    <div id="answer">等待分析...</div>
</div>

<script>
    // ==========================================
    // 🔑 這裡填新 Key：請將申請到的新 Key 拆成兩半填入
    // ==========================================
    const key_part_A = 'AIzaSyBnPPf4S6D1k7ypv'; 
    const key_part_B = 'EFBHqSWSOn5vdr_q4U'; 
    const _finalKey = key_part_A + key_part_B;

    // 使用穩定版模型 ID
    const MODEL_ID = 'gemini-1.5-flash'; 

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptDiv = document.getElementById('transcript');
    const answerDiv = document.getElementById('answer');
    const statusSpan = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    let recognition, fullTranscript = "", uploadedKnowledge = "";

    // 語音辨識
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript;
                else interim += e.results[i][0].transcript;
            }
            transcriptDiv.innerHTML = fullTranscript + '<span style="color:gray">' + interim + '</span>';
        };
    }

    // 檔案載入
    fileInput.onchange = (e) => {
        uploadedKnowledge = "";
        for (let file of e.target.files) {
            let reader = new FileReader();
            reader.onload = (ev) => { uploadedKnowledge += ev.target.result + "\n"; };
            reader.readAsText(file);
        }
        statusSpan.innerText = "✅ 知識庫已載入";
    };

    startBtn.onclick = () => {
        fullTranscript = ""; transcriptDiv.innerText = "";
        recognition.start();
        statusSpan.innerText = "🔴 錄音中...";
        startBtn.disabled = true; stopBtn.disabled = false;
    };

    stopBtn.onclick = async () => {
        recognition.stop();
        statusSpan.innerText = "⌛ AI 分析中...";
        stopBtn.disabled = true;
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${_finalKey}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請根據知識庫分析對話內容。\n\n【知識庫】：\n" + uploadedKnowledge + "\n【對話】：\n" + fullTranscript }] }]
                })
            });

            const data = await response.json();
            if (data.candidates) {
                answerDiv.innerText = data.candidates[0].content.parts[0].text;
                statusSpan.innerText = "✅ 完成";
            } else {
                answerDiv.innerText = "分析異常：" + (data.error ? data.error.message : "請確認 Key 是否有效");
            }
        } catch (err) {
            answerDiv.innerText = "連線失敗";
        }
        startBtn.disabled = false;
    };
</script>
</body>
</html>
