<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>診斷助手 - 終極測試版</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 50px auto; padding: 20px; line-height: 1.5; }
        .box { border: 2px solid #ccc; padding: 20px; border-radius: 10px; background: #fff; }
        #transcript { border: 1px solid #ddd; padding: 10px; height: 100px; margin: 10px 0; background: #f9f9f9; overflow-y: auto; }
        #answer { border: 2px solid #28a745; padding: 15px; background: #f0fff0; white-space: pre-wrap; margin-top: 15px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-start { background: #007bff; color: white; border: none; border-radius: 5px; }
        .btn-stop { background: #dc3545; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🩺 診斷助手 (終極除錯版)</h2>
    
    <div style="margin-bottom: 20px; background: #eee; padding: 10px;">
        <strong>步驟 1:</strong> <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div>
        <button id="startBtn" class="btn-start">🎤 開始錄音</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹️ 停止診斷</button>
        <span id="status" style="margin-left: 10px;">狀態: 等待中</span>
    </div>

    <h3>對話文字：</h3>
    <div id="transcript"></div>

    <h3>AI 建議：</h3>
    <div id="answer"></div>
</div>

<script>
    // --- 🔑 請務必確認這一行 ---
    const API_KEY = 'AIzaSyBfIbwNAKnDl-GlrkkH1Oxg4A6op0aAUYU'; 

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const transcriptDiv = document.getElementById('transcript');
    const answerDiv = document.getElementById('answer');
    const statusSpan = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    let recognition;
    let fullTranscript = "";
    let uploadedKnowledge = "";

    // 1. 初始化 (即使失敗也不要鎖死按鈕)
    try {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) fullTranscript += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                transcriptDiv.innerHTML = fullTranscript + '<span style="color:gray">' + interim + '</span>';
            };
        }
    } catch (e) {
        console.error("語音初始化失敗", e);
    }

    // 2. 檔案讀取
    fileInput.onchange = function(e) {
        const files = e.target.files;
        uploadedKnowledge = "";
        let count = 0;
        for (let file of files) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                uploadedKnowledge += ev.target.result + "\n";
                count++;
                if (count === files.length) statusSpan.innerText = "狀態: 知識庫已載入";
            };
            reader.readAsText(file);
        }
    };

    // 3. 開始按鈕 (強制執行)
    startBtn.onclick = function() {
        fullTranscript = "";
        transcriptDiv.innerHTML = "";
        try {
            if (!recognition) {
                alert("此瀏覽器不支援語音辨識，請換 Chrome 試試。");
                return;
            }
            recognition.start();
            statusSpan.innerText = "狀態: 正在聽取...";
            startBtn.disabled = true;
            stopBtn.disabled = false;
        } catch (err) {
            alert("啟動失敗: " + err.message);
        }
    };

    // 4. 停止按鈕
    stopBtn.onclick = async function() {
        try { recognition.stop(); } catch(e){}
        statusSpan.innerText = "狀態: AI 分析中...";
        stopBtn.disabled = true;
        await getDiagnosis();
    };

    // 5. API 呼叫 (修正字串拼接)
    async function getDiagnosis() {
        const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=' + API_KEY;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "參考知識庫：\n" + uploadedKnowledge + "\n\n診間對話：\n" + fullTranscript + "\n\n請給出建議。" }]
                    }]
                })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                answerDiv.innerText = data.candidates[0].content.parts[0].text;
                statusSpan.innerText = "狀態: 完成";
            } else {
                answerDiv.innerText = "AI 錯誤訊息: " + JSON.stringify(data);
            }
        } catch (error) {
            answerDiv.innerText = "連線失敗: " + error.message;
        }
        startBtn.disabled = false;
    }
</script>

</body>
</html>
